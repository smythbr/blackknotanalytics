<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Black Knot Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="bk.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--black);
      padding: 24px;
    }
    .reset-card {
      background: var(--dark);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .reset-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--white);
      margin-bottom: 8px;
    }
    .reset-logo span { color: var(--red); }
    .reset-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--white);
      margin: 24px 0 8px;
    }
    .reset-sub {
      font-size: 0.9rem;
      color: var(--grey);
      margin-bottom: 28px;
    }
    .reset-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .reset-form input {
      background: var(--black);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--white);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem;
      padding: 12px 14px;
      width: 100%;
      box-sizing: border-box;
    }
    .reset-form input::placeholder { color: var(--grey); }
    .reset-form input:focus { outline: none; border-color: var(--red); }
    .reset-form button {
      background: var(--red);
      border: none;
      border-radius: 6px;
      color: var(--white);
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 13px;
      transition: background 0.2s;
    }
    .reset-form button:hover { background: var(--red-dark); }
    .reset-form button:disabled { background: var(--grey); cursor: not-allowed; }
    .reset-msg {
      margin-top: 16px;
      font-size: 0.875rem;
      min-height: 1.2em;
    }
    .reset-msg.success { color: var(--green-pos); }
    .reset-msg.error   { color: var(--red-neg); }
    .reset-footer {
      margin-top: 24px;
      font-size: 0.82rem;
      color: var(--grey);
    }
    .reset-footer a { color: var(--red); text-decoration: none; }
    .strength-bar {
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      overflow: hidden;
      margin-top: -6px;
    }
    .strength-fill {
      height: 100%;
      width: 0%;
      transition: width 0.3s, background 0.3s;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="reset-card" id="resetCard">
    <div class="reset-logo">BLACK <span>KNOT</span> ANALYTICS</div>
    <h1 class="reset-title">Set New Password</h1>
    <p class="reset-sub">Enter a new password for your account.</p>

    <form class="reset-form" onsubmit="handleReset(event)" id="resetForm">
      <input type="password" id="newPassword" placeholder="New password (min 8 characters)" required minlength="8" autocomplete="new-password" oninput="checkStrength(this.value)">
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <input type="password" id="confirmPassword" placeholder="Confirm new password" required minlength="8" autocomplete="new-password">
      <button type="submit" id="resetBtn">Update Password</button>
    </form>
    <p class="reset-msg" id="resetMsg"></p>
    <p class="reset-footer"><a href="index.html">← Back to home</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.0"></script>
  <script>
    const SUPABASE_URL = 'https://lteeroxgbxbgvfqntfoo.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_J2Ik8meti23EXo_sNEX7bQ_dpYmZDgz';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: {
        persistSession:     true,
        autoRefreshToken:   true,
        detectSessionInUrl: true
      }
    });

    // ── Password strength indicator ──────────────────────────
    function checkStrength(password) {
      const fill = document.getElementById('strengthFill');
      let score = 0;
      if (password.length >= 8)  score++;
      if (password.length >= 12) score++;
      if (/[A-Z]/.test(password)) score++;
      if (/[0-9]/.test(password)) score++;
      if (/[^A-Za-z0-9]/.test(password)) score++;
      const pct = (score / 5) * 100;
      fill.style.width = pct + '%';
      fill.style.background = score <= 1 ? '#cc1010' : score <= 3 ? '#e0a020' : '#2e7d32';
    }

    // ── Handle the reset ─────────────────────────────────────
    async function handleReset(e) {
      e.preventDefault();
      const btn  = document.getElementById('resetBtn');
      const msg  = document.getElementById('resetMsg');
      const newPw  = document.getElementById('newPassword').value;
      const confPw = document.getElementById('confirmPassword').value;

      if (newPw !== confPw) {
        msg.className = 'reset-msg error';
        msg.textContent = 'Passwords do not match. Please try again.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating...';
      msg.className = 'reset-msg';
      msg.textContent = '';

      try {
        const { error } = await sb.auth.updateUser({ password: newPw });
        if (error) throw error;
        msg.className = 'reset-msg success';
        msg.textContent = 'Password updated! Redirecting to dashboard...';
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Update Password';
        msg.className = 'reset-msg error';
        msg.textContent = err.message || 'Update failed. The link may have expired — request a new one.';
      }
    }

    // ── Verify we have a valid session from the reset link ───
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        // Good — user arrived via a valid reset link. Form is ready.
        document.getElementById('resetMsg').className = 'reset-msg success';
        document.getElementById('resetMsg').textContent = 'Link verified — enter your new password below.';
      }
    });
  </script>
</body>
</html>
