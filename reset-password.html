<!DOCTYPE html>
<!-- BLACK KNOT ANALYTICS — Reset Password | reset-password.html | v4.0 (integrated CSS) -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Reset Password — Black Knot Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="bk.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card" id="resetCard">
      <div class="auth-eyebrow">Black Knot Analytics</div>
      <h1 class="auth-title">Set New Password</h1>
      <p class="auth-msg">Enter a new password for your account.</p>

      <form class="auth-form" onsubmit="handleReset(event)" id="resetForm">
        <input type="password" id="newPassword" placeholder="New password (min 8 characters)" required minlength="8" autocomplete="new-password" oninput="checkStrength(this.value)">
        <div class="auth-strength-bar"><div class="auth-strength-fill" id="strengthFill"></div></div>
        <input type="password" id="confirmPassword" placeholder="Confirm new password" required minlength="8" autocomplete="new-password">
        <button type="submit" id="resetBtn">Update Password</button>
      </form>
      <p class="auth-result-msg" id="resetMsg"></p>
      <p class="auth-footer"><a href="index.html">← Back to home</a></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.0"></script>
  <script>
    const SUPABASE_URL = 'https://lteeroxgbxbgvfqntfoo.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_J2Ik8meti23EXo_sNEX7bQ_dpYmZDgz';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: {
        persistSession:     true,
        autoRefreshToken:   true,
        detectSessionInUrl: true
      }
    });

    // ── Password strength indicator ──────────────────────────
    function checkStrength(password) {
      const fill = document.getElementById('strengthFill');
      let score = 0;
      if (password.length >= 8)  score++;
      if (password.length >= 12) score++;
      if (/[A-Z]/.test(password)) score++;
      if (/[0-9]/.test(password)) score++;
      if (/[^A-Za-z0-9]/.test(password)) score++;
      const pct = (score / 5) * 100;
      fill.style.width = pct + '%';
      fill.style.background = score <= 1 ? '#cc1010' : score <= 3 ? '#e0a020' : '#2e7d32';
    }

    // ── Handle the reset ─────────────────────────────────────
    async function handleReset(e) {
      e.preventDefault();
      const btn  = document.getElementById('resetBtn');
      const msg  = document.getElementById('resetMsg');
      const newPw  = document.getElementById('newPassword').value;
      const confPw = document.getElementById('confirmPassword').value;

      if (newPw !== confPw) {
        msg.className = 'auth-result-msg error';
        msg.textContent = 'Passwords do not match. Please try again.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating...';
      msg.className = 'auth-result-msg';
      msg.textContent = '';

      try {
        const { error } = await sb.auth.updateUser({ password: newPw });
        if (error) throw error;
        msg.className = 'auth-result-msg success';
        msg.textContent = 'Password updated! Redirecting to dashboard...';
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Update Password';
        msg.className = 'auth-result-msg error';
        msg.textContent = err.message || 'Update failed. The link may have expired — request a new one.';
      }
    }

    // ── Verify we have a valid session from the reset link ───
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        document.getElementById('resetMsg').className = 'auth-result-msg success';
        document.getElementById('resetMsg').textContent = 'Link verified — enter your new password below.';
      }
    });
  </script>
</body>
</html>
