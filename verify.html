<!DOCTYPE html>
<!-- BLACK KNOT ANALYTICS — Email Verification Landing | verify.html | v4.0 (integrated CSS) -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<link rel="shortcut icon" href="/favicon.ico">
<title>Email Verified — Black Knot Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="bk.css">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card" id="card">
    <div class="auth-eyebrow">Verifying...</div>
    <h1 class="auth-title">One moment</h1>
    <p class="auth-msg">Confirming your email address.</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.0"></script>
<script src="bk-auth.js"></script>
<script>
// ── On load, check if session exists (Supabase auto-parses URL hash) ──
(async () => {
  const card = document.getElementById('card');

  // Give Supabase a moment to parse the hash fragment in the URL
  await new Promise(r => setTimeout(r, 400));

  const { data: { session }, error } = await sb.auth.getSession();

  if (error) {
    card.innerHTML = `
      <div class="auth-eyebrow error">Verification Error</div>
      <h1 class="auth-title">Something went wrong</h1>
      <p class="auth-msg">${error.message || 'Unable to verify your email. The link may have expired.'}</p>
      <a href="index.html" class="btn btn-primary">Back to Home</a>
    `;
    return;
  }

  if (session) {
    card.innerHTML = `
      <div class="auth-eyebrow">Email Verified</div>
      <h1 class="auth-title">Welcome to<br>Black Knot</h1>
      <p class="auth-msg">Your account is active and you're signed in. You now have access to the full performance dashboard.</p>
      <a href="dashboard.html" class="btn btn-primary">Enter Dashboard</a>
    `;
  } else {
    card.innerHTML = `
      <div class="auth-eyebrow">Verification Link Expired</div>
      <h1 class="auth-title">Please<br>sign in</h1>
      <p class="auth-msg">Your email has been confirmed, but the session expired. Please sign in to continue.</p>
      <a href="index.html" class="btn btn-primary">Go to Sign In</a>
    `;
  }
})();
</script>
</body>
</html>
