<script>
/* ════════════════════════════════════════════════════════════════════════
   Black Knot dashboard renderer — consumes the blackknot.v3 contract.

   The contract is SELF-DESCRIBING: blocks declare their type + visibility;
   tables declare their columns (with emphasis) + rows of {value, kind} cells.
   This renderer FORMATS and DISPLAYS only — it performs no financial maths and
   infers nothing from key names. Add a block type → add one renderer + register
   it; add a metric → it flows through generically.

   Division of labour: the back end computes + decides + masks; this layer owns
   wording, colour, and layout. State (hold/action/pending) is semantic; the
   words ("NO ACTION REQUIRED") live here, so copy changes never touch the JSON.
════════════════════════════════════════════════════════════════════════ */

// ── NAV ───────────────────────────────────────────────────
function navTo(page) {
  document.querySelectorAll('.db-page-section').forEach(s => s.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.db-nav-link').forEach(l => l.classList.remove('active'));
  const btn = document.querySelector(`.db-nav-link[data-page="${page}"]`);
  if (btn) btn.classList.add('active');
  ['menuToday','menuAegis','menuEidos','menuHedra'].forEach(id => document.getElementById(id).classList.remove('active'));
  const menuMap = { today:'menuToday', aegis:'menuAegis', eidos:'menuEidos', hedra:'menuHedra' };
  if (menuMap[page]) document.getElementById(menuMap[page]).classList.add('active');
  window.scrollTo(0,0);
}
function toggleMenu() {
  document.getElementById('hamburger').classList.toggle('open');
  document.getElementById('menuOverlay').classList.toggle('open');
}
document.addEventListener('click', e => {
  const menu = document.getElementById('menuOverlay'), burger = document.getElementById('hamburger');
  if (menu.classList.contains('open') && !menu.contains(e.target) && !burger.contains(e.target)) {
    menu.classList.remove('open'); burger.classList.remove('open');
  }
});
window.addEventListener('scroll', () => {
  document.getElementById('dbNav').classList.toggle('scrolled', window.scrollY > 40);
});
async function signOut() {
  try { await sb.auth.signOut(); } catch(e) {}
  window.location.replace('index.html');
}

// ── STATE → wording + style (front end owns the words) ────
const STATE_LABEL = { hold: 'NO ACTION REQUIRED', action: 'ACTION REQUIRED', pending: 'PENDING' };
const STATE_CLASS = { hold: 'hold', action: 'action', pending: 'pending' };
const stateLabel = s => STATE_LABEL[s] || '—';
const stateClass = s => STATE_CLASS[s] || 'hold';

// ── CELL FORMATTING (one formatter per declared kind) ─────
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(d) { if (!d) return '—'; const p = d.split('-'); return `${parseInt(p[2])} ${MONTHS[parseInt(p[1])-1]} ${p[0]}`; }

function fmtKind(value, kind) {
  if (value == null) return '—';
  const n = Number(value);
  switch (kind) {
    case 'pct':        return n.toFixed(2) + '%';
    case 'pct_signed': return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
    case 'pct_whole':  return Math.round(n) + '%';
    case 'ratio':      return n.toFixed(2);
    case 'num':        return n.toFixed(1);
    case 'int':        return String(value);
    default:           return String(value);
  }
}
const isPctKind = k => k === 'pct' || k === 'pct_signed' || k === 'pct_whole';
const signClass = v => v == null ? 'neu' : (v >= 0 ? 'pos' : 'neg');

// Cell colour class inside a table, from the column's emphasis + the cell kind.
function cellClass(cell, col) {
  const emph = col.emphasis;
  if (emph === 'bench') return 'td-bench';
  if (emph === 'model') {
    if (isPctKind(cell.kind)) return cell.value == null ? 'td-bench' : (cell.value >= 0 ? 'td-pos' : 'td-neg');
    return 'td-model';
  }
  return '';
}

// ── TABLE ENGINE (renders any self-describing table) ──────
function renderTable(t, opts) {
  opts = opts || {};
  const cols = t.columns || [];
  const showHead = opts.head !== false && cols.some(c => c.label);
  let thead = '';
  if (showHead) {
    thead = '<thead><tr>' + cols.map(c =>
      `<th${c.emphasis === 'model' ? ' class="col-model"' : ''}>${c.label || ''}</th>`).join('') + '</tr></thead>';
  }
  const body = (t.rows || []).map(row => {
    const tds = cols.map(c => {
      const v = row[c.key];
      if (c.key === 'label' || typeof v !== 'object' || v == null) {
        return `<td>${v == null ? '—' : (v.value !== undefined ? fmtKind(v.value, v.kind) : v)}</td>`;
      }
      return `<td class="${cellClass(v, c)}">${fmtKind(v.value, v.kind)}</td>`;
    }).join('');
    return `<tr${row.ytd ? ' class="row-ytd"' : ''}>${tds}</tr>`;
  }).join('');
  const heading = t.title ? `<div class="perf-table-heading">${t.title}</div>` : '';
  return `<div class="perf-table-block">${heading}
    <div class="perf-table-wrap"><table class="perf-table">${thead}<tbody>${body}</tbody></table></div></div>`;
}

// Weight strip (signal block + card). `mapLabel` lets the card shorten labels.
function renderWeights(weights, mapLabel) {
  return (weights || []).map(w => {
    const label = mapLabel ? mapLabel(w.label) : w.label;
    const zero = w.value === 0 ? ' zero' : '';
    return `<div class="signal-alloc-block"><div class="signal-alloc-ticker">${label}</div>
      <div class="signal-alloc-pct${zero}">${fmtKind(w.value, w.kind)}</div></div>`;
  }).join('');
}

function renderDecomp(decomp, mapLabel) {
  const serif = "'Cormorant Garamond',Georgia,serif";
  const head = decomp.map(d => `<div style="text-align:center;color:#8a8a8a;font-size:clamp(9px,2.6vw,12px);font-weight:600;letter-spacing:0.1em;padding-bottom:4px;">${(mapLabel?mapLabel(d.label):d.label).toUpperCase()}</div>`).join('');
  const rl = (txt, op) => `<div style="display:flex;align-items:center;gap:5px;color:#7a7a7a;font-size:11px;font-weight:500;letter-spacing:0.1em;">${op?`<span style="color:#6a6a6a;font-size:15px;font-family:${serif};">${op}</span>`:''}${txt}</div>`;
  const bookRow = decomp.map(d =>
    `<div style="text-align:center;padding:8px 0;font-family:${serif};font-size:clamp(15px,4.4vw,25px);color:${d.book===0?'#4a4a4a':'#e8e8e8'};">${d.book}%</div>`).join('');
  const vamsRow = decomp.map(d => {
    if (d.scalar === null || d.scalar === undefined)
      return `<div style="text-align:center;padding:6px 0;"><div style="font-family:${serif};font-size:clamp(14px,4vw,22px);color:#6a6a6a;line-height:1.1;">&mdash;</div><div style="color:#5c5c5c;font-size:10px;letter-spacing:0.1em;">SWEEP</div></div>`;
    const full = d.scalar >= 0.999, half = d.scalar > 0.001 && d.scalar < 0.999;
    const c = full ? '#4ade80' : (half ? '#e0a93f' : '#e2564f');
    const tc = full ? '#3f8a55' : (half ? '#8a6a2f' : '#9a4a45');
    const tag = full ? 'HELD' : 'SCALED';
    return `<div style="text-align:center;padding:6px 0;"><div style="font-family:${serif};font-size:clamp(14px,4vw,22px);color:${c};line-height:1.1;">${d.scalar.toFixed(1)}&times;</div><div style="color:${tc};font-size:10px;letter-spacing:0.1em;">${tag}</div></div>`;
  }).join('');
  const netRow = decomp.map(d => {
    const on = d.net !== 0;
    return `<div style="padding:16px 0;text-align:center;background:${on?'#101814':'#0c0c0c'};border:1px solid #1c1c1c;border-top:2px solid ${on?'#4ade80':'#2a2a2a'};font-family:${serif};font-size:clamp(18px,5.2vw,32px);color:${on?'#ffffff':'#4a4a4a'};">${d.net}%</div>`;
  }).join('');
  const cols = `clamp(46px,13vw,90px) repeat(${decomp.length},minmax(0,1fr))`;
  return `<div style="display:grid;grid-template-columns:${cols};gap:clamp(4px,1.6vw,10px);align-items:center;margin-top:6px;">
      <div></div>${head}
      ${rl('Book')}${bookRow}
      ${rl('VAMS','&times;')}${vamsRow}
      ${rl('Net','=')}${netRow}
    </div>`;
}

// ── BLOCK RENDERERS (registry, keyed by block.type) ───────
function blkSignal(b, data) {
  let inner;
  if (b.note) {
    inner = `<div class="signal-pending">${b.note}</div>`;
  } else {
    const status = data.model.state === 'action'
      ? `<div class="signal-status action">Action Required</div>` : '';
    const body = (b.decomp && b.decomp.length)
      ? renderDecomp(b.decomp, cardLabel)
      : `<div class="signal-alloc-row">${renderWeights(b.weights, cardLabel)}</div>`;
    inner = `${status}${body}`;
  }
  return `<div class="db-block"><div class="db-eyebrow">Asset Allocation</div>
    <div class="signal-panel">${inner}</div></div>`;
}

// ── Change events (REGIME / ASSET VAMS lines vs last committed state) ──────────
// Published for owned models (Eidos/Aegis); Hedra's block is visible:false and is
// skipped by the dispatch loop, so nothing IP-sensitive ever renders. Colours
// match the model convention: regimes G/R = green (risk-on), S/D/Inflation = red;
// VAMS scalars Bullish = green, Neutral = amber, Bearish = red. No events ⇒ the
// block renders nothing (an empty, quiet day).
const RISKON_REGIMES = { Goldilocks: 1, Reflation: 1 };
const SCALAR_LABEL = { 1: 'Bullish', 0.5: 'Neutral', 0: 'Bearish' };
function regimeColor(r) { return RISKON_REGIMES[r] ? '#4ade80' : '#e2564f'; }
function scalarColor(s) { return s >= 0.999 ? '#4ade80' : (s > 0.001 ? '#e6b450' : '#e2564f'); }
function scalarText(s, label) {
  const word = label || SCALAR_LABEL[s] || '—';
  return `${word} (${Number(s).toFixed(1)})`;
}
// Change lines (REGIME / ASSET VAMS) — returned as inline rows for the header
// block, NOT a standalone section. Reads the `changes` block from data.blocks.
// Hedra's changes block is visible:false → returns '' (suppressed). No events
// (quiet day) → returns ''. Colours: regimes G/R green, S/D red; VAMS Bullish
// green, Neutral amber, Bearish red. Accent bar red on action, grey otherwise.
function changeLinesFor(data) {
  const b = (data.blocks || []).find(x => x.type === 'changes');
  if (!b || !b.visible) return '';               // missing or Hedra-suppressed
  const events = b.events || [];
  if (!events.length) return '';                 // quiet day
  const action = data.model.state === 'action';
  const bar = action ? '#cc1010' : 'rgba(255,255,255,0.18)';
  const lines = events.map(ev => {
    let label, mid;
    if (ev.kind === 'regime') {
      label = 'Regime Change';
      mid = `<span style="color:${regimeColor(ev.from)}">${ev.from}</span>`
          + `<span style="color:#6f6f69;margin:0 7px">&rarr;</span>`
          + `<span style="color:${regimeColor(ev.to)}">${ev.to}</span>`;
    } else if (ev.kind === 'vams') {
      label = 'Asset VAMS Change';
      const sleeve = `<span style="color:#9c9c97">${ev.sleeve}</span>`
                   + `<span style="color:#6f6f69;margin:0 8px">&middot;</span>`;
      mid = sleeve
          + `<span style="color:${scalarColor(ev.from)}">${scalarText(ev.from, ev.from_label)}</span>`
          + `<span style="color:#6f6f69;margin:0 7px">&rarr;</span>`
          + `<span style="color:${scalarColor(ev.to)}">${scalarText(ev.to, ev.to_label)}</span>`;
    } else { return ''; }
    return `<div class="change-line" style="border-left:2px solid ${bar};padding:3px 0 3px 12px;margin:6px 0;
      font-size:clamp(11px,2.7vw,13px);letter-spacing:0.04em;">
      <span style="color:#8a8a84;text-transform:uppercase;letter-spacing:0.1em;font-size:0.85em">${label}</span>
      <span style="margin-left:10px">${mid}</span></div>`;
  }).join('');
  return `<div class="change-lines" style="margin:14px 0 4px;">${lines}</div>`;
}

function blkPerformance(b, data) {
  let inner;
  if (b.tables && b.tables.length) {
    inner = b.tables.map(t => renderTable(t)).join('');
  } else {
    inner = `<div class="signal-panel"><div class="signal-pending">${b.note || 'Performance is published once the signal is live.'}</div></div>`;
  }
  return `<div class="db-block"><div class="db-eyebrow">Performance</div>${inner}</div>`;
}

// Regime pill — colour by the row's risk side (back end supplies w.risk).
function regimePill(label, risk) {
  const cls = risk === 'risk-on' ? 'r-on' : (risk === 'risk-off' ? 'r-off' : 'r-arch');
  return `<span class="regime-pill sz-aegis ${cls}">${label || '—'}</span>`;
}

// Dedicated Asset-Allocation renderer (recovered original design): rebalance
// ledger as the .alloc-table — Date · Regime pill · class weights · Days ·
// Trigger, with the live "Now" row marked .is-current. Reads the self-describing
// table but renders the pill/Days/Trigger specially (they are UI, not metrics).
function blkAllocation(b, data) {
  const t = b.table;
  if (!t) {
    return `<div class="db-block"><div class="db-eyebrow">Portfolio</div>
      <div class="db-title">Asset Allocation</div>
      <div class="signal-panel"><div class="signal-pending">${b.note || 'Allocation detail is published once the signal is live.'}</div></div></div>`;
  }
  // Weight columns = the class columns (everything between Regime and Days).
  const wcols = (t.columns || []).filter(c =>
    !['date','regime','days','trigger'].includes(c.key));
  const thead = '<thead><tr>'
    + '<th class="th-left">Date</th>'
    + '<th class="th-center">Regime</th>'
    + wcols.map(c => `<th>${cardLabel(c.label)}</th>`).join('')
    + '<th>Days</th><th class="th-left">Trigger</th>'
    + '</tr></thead>';
  const body = (t.rows || []).map(r => {
    const cur = r.current ? ' class="is-current"' : '';
    const wtds = wcols.map(c => {
      const v = r[c.key] ? r[c.key].value : null;
      const zero = (v === 0) ? ' style="color:#444"' : '';
      return `<td${zero}>${v == null ? '—' : v + '%'}</td>`;
    }).join('');
    const days = (r.days && r.days.value != null) ? r.days.value : '—';
    return `<tr${cur}>`
      + `<td class="td-left">${r.date === 'Now' ? 'Now' : fmtDate(r.date)}</td>`
      + `<td class="td-center">${regimePill(r.regime, r.risk)}</td>`
      + wtds
      + `<td>${days}</td>`
      + `<td class="td-left">${r.trigger || '—'}</td>`
      + `</tr>`;
  }).join('');
  return `<div class="db-block"><div class="db-eyebrow">Portfolio</div>
    <div class="db-title">Asset Allocation</div>
    <div class="db-sub">Historical portfolio states. One row per rebalancing event.</div>
    <div class="alloc-table-wrap"><table class="alloc-table">${thead}<tbody>${body}</tbody></table></div></div>`;
}

function blkRebalancing(b, data) {
  if (!b || !b.table) return '';
  const sp = b.table.split, ro = b.table.roro;
  if (sp) {
    // Three-column period block; rows = [label,value] pairs, last row is the Total.
    const col = (title, rows, last) => {
      const body = rows.map((r, k) => {
        const isTotal = k === rows.length - 1;
        const lblCol = isTotal ? '#4ade80' : 'var(--grey, #9C9C97)';
        const valCol = isTotal ? '#4ade80' : 'var(--white, #fff)';
        const valSz = isTotal ? '1.05rem' : 'var(--fs-md, 0.9375rem)';
        const valWt = isTotal ? '600' : '600';
        const pad = isTotal ? 'padding:11px 0 0;' : 'padding:9px 0;border-bottom:1px solid #161616;';
        const lblWt = isTotal ? 'font-weight:600;letter-spacing:0.06em;' : '';
        return `<div style="display:flex;justify-content:space-between;align-items:baseline;${pad}">
          <span style="color:${lblCol};font-size:clamp(11.5px,3.3vw,15px);${lblWt}white-space:nowrap;">${r[0]}</span>
          <span style="color:${valCol};font-size:${valSz};font-weight:${valWt};font-variant-numeric:tabular-nums;">${r[1]}</span></div>`;
      }).join('');
      return `<div style="${last ? '' : 'border-right:1px solid #1c1c1c;'}padding:0 clamp(7px,2.8vw,26px);min-width:0;">
        <div style="color:#9a9a9a;font-size:clamp(9px,2.5vw,11px);font-weight:700;letter-spacing:clamp(0.05em,1.2vw,0.18em);margin-bottom:16px;white-space:nowrap;">${title}</div>
        ${body}</div>`;
    };
    const grid = (mk) => `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:0;">
        ${col('YTD', mk('ytd'), false)}
        ${col('ITD', mk('itd'), false)}
        ${col('AVERAGE / YR', mk('yr'), true)}</div>`;

    // Row keys/labels: models may anonymise (Hedra emits macro/trend); default
    // to regime/vams for Eidos/Aegis.
    const ka = (sp.keys && sp.keys.a) || 'regime';
    const kb = (sp.keys && sp.keys.b) || 'vams';
    const la = (sp.labels && sp.labels.a) || 'Regime';
    const lb = (sp.labels && sp.labels.b) || 'VAMS';
    const rebalGrid = grid(p => [[la, sp[p][ka]], [lb, sp[p][kb]], ['Total', sp[p].total]]);
    let roBlock = '';
    if (ro) {
      const roGrid = grid(p => [['To risk-off', ro[p].off], ['To risk-on', ro[p].on], ['Total', ro[p].total]]);
      roBlock = `<div class="db-block"><div class="db-eyebrow">Risk-On / Risk-Off</div>
        <div class="db-title" style="font-size:15px;margin-bottom:6px;">RORO Flips</div>
        <div style="color:#8a8a8a;font-size:12.5px;margin-bottom:20px;">Rebalances that crossed the risk-on / risk-off boundary</div>
        ${roGrid}</div>`;
    }
    return `<div class="db-block"><div class="db-eyebrow">Rebalancing</div>
      <div class="db-title" style="font-size:15px;margin-bottom:20px;">Operational Metrics</div>
      ${rebalGrid}</div>${roBlock}`;
  }
  return `<div class="db-block"><div class="db-eyebrow">Rebalancing</div>${renderTable(b.table)}</div>`;
}

// Market View — compact, dashboard-native panel drawn from the market_view
// block's GIL series. Phase plane (left) + readout (right), side by side, fits a
// laptop screen at once. This is a deliberately LIGHTER view than the full
// standalone instrument (no animation/scrubber) — the rich interactive instrument
// remains the deep-dive artifact. Conviction = ||(g,i)||σ and regime age =
// consecutive same-regime count are the SAME presentation derivations the
// instrument uses (replicated, not re-invented). Colour by risk side (g>=0
// risk-on green / g<0 risk-off red) to match the allocation pills.
function mvFmtDate(d) { return fmtDate(d); }

// Pure helper: the phase-plane SVG for a given index. Axes: INFLATION on x
// (+right), GROWTH on y (+up). Risk side = sign of growth. Trail by mode:
// month = 6 monthly points (T6M) showing the path; day = current dot only (no
// breadcrumbs — daily points clump too tightly on the σ scale to read as a path).
// Grey connecting line, each breadcrumb dot coloured by its OWN risk side. Dynamic
// conviction ring = ||(g,i)|| nailed to the current point. Sigma ticks on +I axis.
// Shared phase-plane drawer. F maps the frame's field names → g/i (and optional
// conv) so AEGIS (gd/id) and EIDOS (g/i) share ONE drawing function — no per-model
// duplication, no shape-sniffing. F = {g:'gd', i:'id', conv:null} for Aegis;
// {g:'g', i:'i', conv:'conv'} for Eidos (Eidos persists conviction; Aegis derives it).
function phasePlaneSVG(ser, idx, R, F) {
  F = F || { g: 'gd', i: 'id', conv: null };
  const S = 400, C = 200, M = 34, K = (S / 2 - M) / R;
  const X = v => C + v * K, Y = v => C - v * K;   // x = inflation, y = growth
  const cur = ser[idx];
  const gv = p => p[F.g], iv = p => p[F.i];
  const riskCol = p => (gv(p) >= 0 ? '#4ade80' : '#f87171');
  const col = riskCol(cur);
  const dayMode = (F.conv ? window.__eidMode : window.__mvMode) === 'day';
  const trail = dayMode ? [cur] : ser.slice(Math.max(0, idx - 5), idx + 1);
  const conv = (F.conv && cur[F.conv] != null) ? cur[F.conv] : Math.hypot(gv(cur), iv(cur));
  // Sigma ticks on the +I (right) half of the x-axis only.
  const ticks = [1, 2, 3].map(s =>
    `<line x1="${X(s).toFixed(1)}" y1="${C - 4}" x2="${X(s).toFixed(1)}" y2="${C + 4}" stroke="#9C9C97"/>` +
    `<text x="${X(s).toFixed(1)}" y="${C + 17}" text-anchor="middle" fill="#9C9C97" font-size="10" letter-spacing="0.04em">${s}σ</text>`).join('');
  const trailPts = trail.map(p => `${X(iv(p)).toFixed(1)},${Y(gv(p)).toFixed(1)}`).join(' ');
  const trailDots = trail.slice(0, -1).map(p =>
    `<circle cx="${X(iv(p)).toFixed(1)}" cy="${Y(gv(p)).toFixed(1)}" r="3" fill="${riskCol(p)}" opacity="0.75"/>`).join('');
  // White drift arrowhead — ONLY in day mode (short-term drift). The day-mode plane
  // shows just the current dot (no trail line); the arrow's direction is the recent
  // 10-session drift (cur vs 10 sessions back), matching the VAMS/component-bar drift
  // window so the whole dashboard reads one "10-session drift" language. Robust to
  // flat/frozen daily patches (a 1-day delta is often zero). Measurement, not forecast.
  let driftHead = '';
  if (dayMode && idx >= 1) {
    const prev = ser[Math.max(0, idx - 10)];
    const cx = X(iv(cur)), cy = Y(gv(cur));
    const dx = cx - X(iv(prev)), dy = cy - Y(gv(prev));
    const mag = Math.hypot(dx, dy);
    if (mag > 2) {
      const ux = dx / mag, uy = dy / mag;
      const shaftLen = 30, hl = 11, hw = 5.5;     // shaft from dot edge outward
      const start = 9;                             // start just past the dot radius
      const sx = cx + ux * start, sy = cy + uy * start;       // shaft start (dot edge)
      const ex = cx + ux * (start + shaftLen), ey = cy + uy * (start + shaftLen); // tip
      const bx = ex - ux * hl, by = ey - uy * hl, perpx = -uy, perpy = ux;
      const p1x = (bx + perpx * hw).toFixed(1), p1y = (by + perpy * hw).toFixed(1);
      const p2x = (bx - perpx * hw).toFixed(1), p2y = (by - perpy * hw).toFixed(1);
      driftHead = `<line x1="${sx.toFixed(1)}" y1="${sy.toFixed(1)}" x2="${ex.toFixed(1)}" y2="${ey.toFixed(1)}" stroke="#FFFFFF" stroke-width="2.5"/>
        <polygon points="${ex.toFixed(1)},${ey.toFixed(1)} ${p1x},${p1y} ${p2x},${p2y}" fill="#FFFFFF"/>`;
    }
  }
  return `<svg viewBox="0 0 ${S} ${S}" style="width:100%;height:auto;display:block;">
    <rect x="0" y="0" width="${S}" height="${C}" fill="#4ade80" opacity="0.08"/>
    <rect x="0" y="${C}" width="${S}" height="${S - C}" fill="#f87171" opacity="0.08"/>
    <line x1="${C}" y1="16" x2="${C}" y2="${S - 16}" stroke="rgba(255,255,255,0.28)"/>
    <line x1="16" y1="${C}" x2="${S - 16}" y2="${C}" stroke="rgba(255,255,255,0.28)"/>
    ${ticks}
    <text x="${C + 7}" y="28" fill="#C8C8C4" font-size="13" letter-spacing="0.1em">+G</text>
    <text x="${S - 20}" y="${C - 8}" text-anchor="end" fill="#C8C8C4" font-size="13" letter-spacing="0.1em">+I</text>
    <text x="${S - 26}" y="42" text-anchor="end" fill="#4ade80" font-size="13" font-weight="600" letter-spacing="0.06em">REFLATION</text>
    <text x="26" y="42" fill="#4ade80" font-size="13" font-weight="600" letter-spacing="0.06em">GOLDILOCKS</text>
    <text x="26" y="${S - 22}" fill="#f87171" font-size="13" font-weight="600" letter-spacing="0.06em">DEFLATION</text>
    <text x="${S - 26}" y="${S - 22}" text-anchor="end" fill="#f87171" font-size="13" font-weight="600" letter-spacing="0.06em">STAGFLATION</text>
    <circle cx="${C}" cy="${C}" r="${(conv * K).toFixed(1)}" fill="none" stroke="${col}" stroke-width="1.5" opacity="0.55" stroke-dasharray="3 3"/>
    <polyline points="${trailPts}" fill="none" stroke="#9C9C97" stroke-width="1.5" opacity="0.5"/>
    ${trailDots}
    <circle cx="${X(iv(cur)).toFixed(1)}" cy="${Y(gv(cur)).toFixed(1)}" r="8" fill="${col}" stroke="#0D0D0D" stroke-width="1.5"/>
    ${driftHead}
  </svg>`;
}

// Back-compat shim: Aegis callers used mvPlaneSVG(ser, idx, R) with gd/id fields.
function mvPlaneSVG(ser, idx, R) { return phasePlaneSVG(ser, idx, R, { g: 'gd', i: 'id', conv: null }); }

// Pure helper: vertical liquidity gauge (blue), to the right of the plane.
// Centre = zero, fill up for loose (+), down for tight (−). Updates on scrub.
function phaseLgauge(ser, idx, R, lkey) {
  lkey = lkey || 'lpe';
  const H = 400, W = 56, cx = W / 2, cy = H / 2, M = 30;
  const K = (H / 2 - M) / R;
  const l = ser[idx][lkey];
  const y = cy - Math.max(-R, Math.min(R, l)) * K;
  const barTop = Math.min(cy, y), barH = Math.abs(y - cy);
  return `<svg viewBox="0 0 ${W} ${H}" style="height:100%;width:${W}px;display:block;">
    <text x="${cx}" y="16" text-anchor="middle" fill="#9C9C97" font-size="10" letter-spacing="0.08em">loose +</text>
    <line x1="${cx}" y1="24" x2="${cx}" y2="${H - 24}" stroke="rgba(255,255,255,0.18)"/>
    <line x1="${cx - 8}" y1="${cy}" x2="${cx + 8}" y2="${cy}" stroke="rgba(255,255,255,0.28)"/>
    <rect x="${cx - 6}" y="${barTop.toFixed(1)}" width="12" height="${barH.toFixed(1)}" fill="#7F77DD" rx="2"/>
    <circle cx="${cx}" cy="${y.toFixed(1)}" r="5" fill="#7F77DD" stroke="#0D0D0D" stroke-width="1.5"/>
    <text x="${cx}" y="${H - 10}" text-anchor="middle" fill="#9C9C97" font-size="10" letter-spacing="0.08em">tight −</text>
  </svg>`;
}
function mvLgauge(ser, idx, R) { return phaseLgauge(ser, idx, R, 'lpe'); }

// Pure helper: the readout column inner HTML for a given index.
function mvReadout(ser, idx, unit) {
  const cur = ser[idx];
  const riskOn = cur.gd >= 0, col = riskOn ? '#4ade80' : '#f87171';
  let age = 1;
  for (let i = idx; i > 0 && ser[i - 1].reg === ser[i].reg; i--) age++;
  const conv = Math.hypot(cur.gd, cur.id);
  const sig = v => (v >= 0 ? '+' : '') + v.toFixed(2);
  const stat = (label, val, color) =>
    `<div class="mv-stat"><div class="mv-stat-k">${label}</div><div class="mv-stat-v"${color ? ` style="color:${color}"` : ''}>${val}</div></div>`;
  return `<div class="mv-regime" style="border-left-color:${col}">
      <div class="mv-stat-k">Regime</div>
      <div class="mv-regime-name" style="color:${col}">${cur.reg}<span class="mv-regime-side"> · ${riskOn ? 'risk-on' : 'risk-off'}</span></div>
    </div>
    <div class="mv-stats">
      ${stat('Growth', sig(cur.gd) + '<small>σ</small>')}
      ${stat('Inflation', sig(cur.id) + '<small>σ</small>')}
      ${stat('Liquidity', sig(cur.lpe) + '<small>σ</small>', '#7F77DD')}
      ${stat('Conviction', conv.toFixed(2) + '<small>σ</small>')}
    </div>
    ${stat('Regime age', age + ' ' + unit)}`;
}

// Global scrubber handler — called by the slider's oninput. Redraws the plane +
// readout for the chosen index from the stashed series, and updates the date.
function mvScrub(idx) {
  idx = +idx;
  const ser = window.__mvSeries; if (!ser) return;
  document.getElementById('mv-plane-box').innerHTML = mvPlaneSVG(ser, idx, window.__mvScope);
  document.getElementById('mv-readout-box').innerHTML = mvReadout(ser, idx, window.__mvUnit);
  const lg = document.getElementById('mv-lgauge-box'); if (lg) lg.innerHTML = mvLgauge(ser, idx, window.__mvScope);
  const lab = document.getElementById('mv-date'); if (lab) lab.textContent = mvFmtDate(ser[idx].date);
  const sl = document.getElementById('mv-slider');
  const prev = document.getElementById('mv-prev'), next = document.getElementById('mv-next');
  if (sl && prev && next) { prev.disabled = idx <= 0; next.disabled = idx >= +sl.max; }
}

// Step the scrubber one index (= one date in the active Month/Day resolution).
// Leaves the slider itself untouched — just nudges its value and redraws.
function mvStep(delta) {
  const sl = document.getElementById('mv-slider'); if (!sl) return;
  const v = Math.min(+sl.max, Math.max(0, (+sl.value) + delta));
  sl.value = v;
  mvScrub(v);
}

// Toggle Month/Day: swap the active series, rebuild the slider range, default to
// the latest point, redraw everything. Helpers are series-agnostic so they just
// take the newly-stashed series.
function mvSetMode(mode) {
  if (mode !== 'month' && mode !== 'day') return;
  window.__mvMode = mode;
  window.__mvSeries = mode === 'month' ? window.__mvMonth : window.__mvDay;
  window.__mvUnit = mode === 'month' ? 'mo' : 'd';
  const ser = window.__mvSeries; const last = ser.length - 1;
  const sl = document.getElementById('mv-slider');
  if (sl) { sl.max = last; sl.value = last; }
  document.getElementById('mv-tog-month').classList.toggle('on', mode === 'month');
  document.getElementById('mv-tog-day').classList.toggle('on', mode === 'day');
  mvScrub(last);
}

// ── EIDOS factor-contribution renderer (own block type) ──
// The two-axis decomposition: each sensor-group's signed push to growth and to
// inflation, with dissent flags. Sits below the phase plane.
function contribCol(factor, d) {
  const net = d.net, netCol = net >= 0 ? '#4ade80' : '#f87171';
  const maxAbs = Math.max.apply(null, d.bars.map(x => Math.abs(x.value)).concat([0.01]));
  const rows = d.bars.map(x => {
    const w = (Math.abs(x.value) / maxAbs * 50).toFixed(1);
    const pos = x.value >= 0, col = pos ? '#4ade80' : '#f87171';
    const fill = pos ? `left:50%;width:${w}%;background:${col};` : `right:50%;width:${w}%;background:${col};`;
    const dis = x.dissent ? '<span class="mv-dissent-dot" title="dissenting"></span>' : '';
    const sign = x.value >= 0 ? '+' : '';
    return `<div class="mv-bar-row">
        <div class="mv-bar-label">${x.group.replace('_',' ')}${dis}</div>
        <div class="mv-bar-track"><div class="mv-bar-mid"></div><div class="mv-bar-fill" style="${fill}"></div></div>
        <div class="mv-bar-val">${sign}${x.value.toFixed(2)}</div>
      </div>`;
  }).join('');
  const dissenters = d.bars.filter(x => x.dissent).map(x => x.group.replace('_',' '));
  const foot = dissenters.length
    ? `<div class="mv-contrib-foot"><span class="dis">●</span> dissenting: ${dissenters.join(', ')} — voting against the net ${factor} call (early-warning)</div>`
    : `<div class="mv-contrib-foot">no dissent — all groups aligned with the net call</div>`;
  return `<div class="mv-contrib-col">
    <div class="mv-contrib-head"><span class="mv-contrib-axis">${factor} contribution</span>
      <span class="mv-contrib-net" style="color:${netCol}">${net>=0?'+':''}${net.toFixed(2)}</span></div>
    <div class="mv-contrib-sub">net vote-margin · bars = each group's signed push</div>
    ${rows}${foot}</div>`;
}
function blkContribution(b, data) {
  const c = b.contribution;
  if (!c || !c.latest) {
    return `<div class="db-block" style="margin-top:-8px;">
      <div class="db-title" style="font-size:15px;margin-bottom:10px;">${b.title || 'Factor Contribution'}</div>
      <div class="signal-panel"><div class="signal-pending">${b.note || 'Factor detail is published once the signal is live.'}</div></div></div>`;
  }
  let bands = '';
  if (b.bands && b.bands.length) {
    const serif = "'Cormorant Garamond',Georgia,serif";
    const Z = 3.0, zpc = z => Math.max(3, Math.min(97, (z / (2 * Z) + 0.5) * 100));
    const rows = b.bands.map(cc => {
      const heldPos = cc.held_sign >= 0;
      const vp = zpc(cc.factor / cc.std), bp = cc.band / cc.std;
      const loEdge = zpc(-bp), hiEdge = zpc(bp);
      const dzv = cc.dz / cc.std, rising = dzv > 0.02, falling = dzv < -0.02;
      const alen = Math.min(8, Math.max(2.5, Math.abs(dzv) * 11));
      let arr = '';
      if (rising || falling) {
        const sx = rising ? vp + 1.3 : vp - 1.3 - alen, hx = rising ? sx + alen : sx, rot = rising ? '45deg' : '225deg';
        arr = `<div style="position:absolute;left:${sx}%;width:${alen}%;top:50%;height:2px;background:#4ade80;transform:translateY(-50%);z-index:3;"></div>
          <div style="position:absolute;left:${hx}%;top:50%;width:8px;height:8px;border-top:2px solid #4ade80;border-right:2px solid #4ade80;transform:translate(-50%,-50%) rotate(${rot});z-index:3;"></div>`;
      }
      const cleared = Math.abs(cc.factor) >= cc.band;   // factor past its own band edge?
      const sameSignLbl = heldPos
        ? `<span style="color:#6a6a6a;">+ ${cleared ? 'confirmed' : 'held'}</span>`
        : `<span style="color:#6a6a6a;">&minus; ${cleared ? 'confirmed' : 'held'}</span>`;
      const leftLabel  = heldPos ? `<span style="color:#c25048;">&rarr; ${cc.flip_name}</span>` : sameSignLbl;
      const rightLabel = heldPos ? sameSignLbl : `<span style="color:#3f8a55;">&rarr; ${cc.flip_name}</span>`;
      return `<div style="margin-bottom:20px;">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px;">
          <span style="color:#cfcfcf;font-size:13px;font-weight:600;letter-spacing:0.1em;">${cc.label.toUpperCase()} <span style="color:#4ade80;font-size:11px;margin-left:6px;">${heldPos ? '+ held' : '&minus; held'}</span></span>
          <span style="color:#9a9a9a;font-size:12px;">factor <span style="color:#4ade80;font-family:${serif};font-size:16px;">${cc.factor >= 0 ? '+' : '\u2212'}${Math.abs(cc.factor).toFixed(2)}</span></span>
        </div>
        <div style="position:relative;height:24px;background:#0e0e0e;border:1px solid #232323;overflow:hidden;">
          <div style="position:absolute;left:0;width:${loEdge}%;top:0;bottom:0;background:rgba(226,86,79,0.12);"></div>
          <div style="position:absolute;left:${hiEdge}%;right:0;top:0;bottom:0;background:rgba(74,222,128,0.14);"></div>
          <div style="position:absolute;left:${loEdge}%;top:0;bottom:0;width:2px;background:${heldPos ? '#e6b450' : '#3a3a3a'};transform:translateX(-1px);z-index:2;"></div>
          <div style="position:absolute;left:${hiEdge}%;top:0;bottom:0;width:2px;background:${heldPos ? '#3a3a3a' : '#e6b450'};transform:translateX(-1px);z-index:2;"></div>
          <div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:#2a2a2a;"></div>
          ${arr}
          <div style="position:absolute;left:${vp}%;top:50%;width:14px;height:14px;background:#4ade80;border:2px solid #0e0e0e;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 8px rgba(74,222,128,0.9);z-index:4;"></div>
        </div>
        <div style="position:relative;height:14px;margin-top:3px;font-size:10px;font-weight:600;">
          <span style="position:absolute;left:${loEdge}%;transform:translateX(-50%);">${leftLabel}</span>
          <span style="position:absolute;left:${hiEdge}%;transform:translateX(-50%);">${rightLabel}</span>
        </div>
      </div>`;
    }).join('');
    bands = `<div style="margin-top:22px;">
      <div style="color:#6a6a6a;font-size:10.5px;letter-spacing:0.16em;margin-bottom:16px;">AXIS DEADBANDS &middot; held sign holds until the factor crosses the opposite edge</div>
      ${rows}</div>`;
  }
  return `<div class="db-block" style="margin-top:-8px;">
    <div class="db-title" style="font-size:15px;margin-bottom:10px;">${b.title || 'Factor Contribution'}</div>
    ${bands}
    <div class="mv-contrib">
      ${contribCol('growth', c.latest.growth)}
      ${contribCol('inflation', c.latest.inflation)}
    </div>
  </div>`;
}

const BLOCK_RENDERERS = {
  signal: blkSignal, performance: blkPerformance,
  allocation: blkAllocation, rebalancing: blkRebalancing, market_view: blkMarketView,
  phase_plane: blkPhasePlane, contribution: blkContribution,
  vams_flip: blkVamsFlip,
  health: blkHealth,
};

// ── VAMS distance / direction / confirm panel (own block type) ──
// z-axis window [-3,+3] → [0,100%]; clamp + flag if a sleeve pegs the edge.
function blkVamsFlip(b, data) {
  const sl = b.sleeves;
  if (!sl || !sl.length) {
    return `<div class="db-block"><div class="db-eyebrow">${b.title || 'VAMS · Distance & Direction'}</div>
      <div class="signal-panel"><div class="signal-pending">${b.note || 'VAMS detail is published once the signal is live.'}</div></div></div>`;
  }
  const serif = "'Cormorant Garamond',Georgia,serif";
  const Z = 3.0, zpc = z => Math.max(2, Math.min(98, (z + Z) / (2 * Z) * 100));
  const rows = sl.map(s => {
    const held = s.state >= 0.999;
    const dot = held ? '#4ade80' : '#e2564f';
    const glow = held ? 'rgba(74,222,128,0.95)' : 'rgba(226,86,79,0.95)';
    const zP = zpc(s.z), halfP = zpc(s.line_half), fullP = zpc(s.line_full);
    const stTag = held ? 'HELD · 1.0&times;' : (s.state > 0.001 ? 'HALF · 0.5&times;' : 'SCALED · 0.0&times;');
    const stCol = held ? '#4ade80' : (s.state > 0.001 ? '#e6b450' : '#e2564f');
    const fillCol = held ? 'linear-gradient(90deg,rgba(74,222,128,0.35),rgba(74,222,128,0.62))'
                         : 'linear-gradient(90deg,rgba(226,86,79,0.62),rgba(226,86,79,0.35))';
    const zoneL = held ? fullP : zP, zoneW = held ? Math.max(0, zP - fullP) : Math.max(0, halfP - zP);
    const rising = s.dz > 0.03, falling = s.dz < -0.03;
    const arrowLen = Math.min(9, Math.max(2.5, Math.abs(s.dz) * 11));
    let arrow = '';
    if (rising || falling) {
      const aCol = held ? '#4ade80' : '#e6b450';
      const shaftL = rising ? zP + 1.4 : zP - 1.4 - arrowLen;
      const headL = rising ? shaftL + arrowLen : shaftL;
      const rot = rising ? '45deg' : '225deg';
      arrow = `<div style="position:absolute;left:${shaftL}%;width:${arrowLen}%;top:50%;height:3px;background:${aCol};transform:translateY(-50%);z-index:3;"></div>
               <div style="position:absolute;left:${headL}%;top:50%;width:9px;height:9px;border-top:3px solid ${aCol};border-right:3px solid ${aCol};transform:translate(-50%,-50%) rotate(${rot});z-index:3;"></div>`;
    }
    let counter;
    if (s.need == null || s.cand === s.state) {
      counter = `<div style="text-align:center;border:1px solid #2a2a2a;background:#0d0d0d;padding:11px 0;">
        <div style="color:#9a9a9a;font-size:12px;font-weight:600;letter-spacing:0.12em;margin-bottom:5px;">NO FLIP PENDING</div>
        <div style="font-family:${serif};font-size:26px;color:#6a6a6a;">&mdash;</div>
        <div style="color:${held ? '#5cb87a' : '#8a8a8a'};font-size:11px;letter-spacing:0.08em;margin-top:4px;">${held ? 'stable held' : 'stable'}</div></div>`;
    } else {
      const up = s.cand > s.state;
      const tgt = s.cand >= 0.999 ? '1.0&times;' : (s.cand > 0.001 ? '0.5&times;' : '0.0&times;');
      const lbl = up ? `RESTORE &rarr; ${tgt}` : `CUT &rarr; ${tgt}`;
      const pct = Math.round(100 * s.cnt / s.need);
      counter = `<div style="text-align:center;border:1px solid #6a571f;background:#1a1505;padding:11px 0;">
        <div style="color:#e6b450;font-size:12px;font-weight:600;letter-spacing:0.12em;margin-bottom:5px;">${lbl}</div>
        <div style="font-family:${serif};font-size:28px;color:#f0c060;line-height:1;"><b>${s.cnt}</b><span style="color:#9a824a;font-size:18px;">/${s.need}</span></div>
        <div style="height:4px;background:#2e280f;margin:7px 12px 0;"><div style="width:${pct}%;height:100%;background:#e6b450;"></div></div></div>`;
    }
    return `<div style="display:grid;grid-template-columns:1fr 150px;gap:22px;align-items:center;margin-bottom:28px;">
      <div>
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:11px;">
          <span style="color:#e8e8e8;font-size:clamp(12px,3.8vw,15px);font-weight:700;letter-spacing:0.08em;">${cardLabel(s.label).toUpperCase()} <span style="color:${stCol};font-size:clamp(10px,3vw,12.5px);font-weight:600;margin-left:clamp(4px,1.5vw,8px);">${stTag}</span></span>
          <span style="color:#b0b0b0;font-size:clamp(11px,3.2vw,13px);white-space:nowrap;">z <span style="color:${stCol};font-family:${serif};font-size:clamp(15px,4.8vw,19px);">${s.z >= 0 ? '+' : '\u2212'}${Math.abs(s.z).toFixed(2)}</span></span>
        </div>
        <div style="position:relative;height:32px;background:#0e0e0e;border:1px solid #262626;">
          <div style="position:absolute;left:${zoneL}%;width:${zoneW}%;top:0;bottom:0;background:${fillCol};"></div>
          <div style="position:absolute;left:${halfP}%;top:0;bottom:0;width:2px;background:#e6b450;transform:translateX(-1px);z-index:2;"></div>
          <div style="position:absolute;left:${fullP}%;top:0;bottom:0;width:2px;background:#f0f0f0;transform:translateX(-1px);z-index:2;"></div>
          ${arrow}
          <div style="position:absolute;left:${zP}%;top:50%;width:16px;height:16px;background:${dot};border:2px solid #0e0e0e;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 10px ${glow};z-index:4;"></div>
        </div>
        <div style="position:relative;height:15px;margin-top:3px;font-size:11px;color:#9a9a9a;font-weight:600;">
          <span style="position:absolute;left:${halfP}%;transform:translateX(-50%);">0.5&times;</span>
          <span style="position:absolute;left:${fullP}%;transform:translateX(-50%);">1.0&times;</span>
        </div>
      </div>
      ${counter}
    </div>`;
  }).join('');
  return `<div class="db-block"><div class="db-eyebrow">${b.title || 'VAMS · Distance & Direction'}</div>
    ${rows}</div>`;
}

// ── MODEL HEALTH (suite — bottom section) ──────────────────
// Renders eidos.json → blocks[health].health.suite. Pure function: computes
// every bar position here and returns positioned HTML (no post-render script).
// Colour/word for each element comes from the block's `state` field (decided in
// eidos_health_suite.py); this only lays it out.
function blkHealth(b, data) {
  const h = b.health && b.health.suite;
  const GREEN = '#4ade80', YELLOW = '#fbbf24', RED = '#f87171',
        GREY = '#9C9C97', SOFT = '#C8C8C4', WHITE = '#fff';
  const COL = { success: GREEN, warning: YELLOW, danger: RED };
  if (!h) {
    return `<div class="db-block"><div class="db-eyebrow">Model Health</div>
      <div class="hs-card"><div style="color:#8a8a8a;font-size:12.5px;">Health is published once the signal is live.</div></div></div>`;
  }
  const clamp = (v, lo, hi) => Math.max(0, Math.min(100, (v - lo) / (hi - lo) * 100));
  const sgn = v => (v >= 0 ? '+' : '') + v;

  // ── RETURN — deviation bars on one shared scale, value above the line ──
  const ax = h.deviation.axis, cx = v => clamp(v, ax[0], ax[1]);
  const devRows = h.deviation.rows.map(d => {
    const band = d.p95 - d.p5, ytop = d.p5 + 0.15 * band, c = COL[d.state] || GREEN;
    const bL = cx(d.p5), bR = cx(d.p95), yR = cx(ytop), medX = cx(d.med), curX = cx(d.cur);
    return `<div class="hs-row"><span class="hs-lab">${d.h}</span>
      <div style="position:relative;height:34px;">
        <div style="position:absolute;top:23px;left:${yR}%;width:${bR - yR}%;height:8px;border-radius:0 3px 3px 0;background:rgba(74,222,128,0.22);border:1px solid rgba(74,222,128,0.4);box-sizing:border-box;"></div>
        <div style="position:absolute;top:23px;left:${bL}%;width:${yR - bL}%;height:8px;background:rgba(251,191,36,0.4);border:1px solid rgba(251,191,36,0.6);box-sizing:border-box;"></div>
        <div style="position:absolute;top:21px;left:${medX}%;width:1.5px;height:12px;background:${GREY};"></div>
        <div style="position:absolute;top:15px;left:${curX}%;width:3px;height:18px;background:${c};transform:translateX(-1.5px);border-radius:1px;"></div>
        <div style="position:absolute;top:0;left:${curX}%;transform:translateX(-50%);font-size:0.9rem;font-weight:600;color:${c};white-space:nowrap;">${sgn(d.cur.toFixed(1))}%</div>
      </div></div>`;
  }).join('');
  const devAxis = `<div class="hs-row"><span></span><div style="position:relative;height:14px;">`
    + h.deviation.ticks.map(t => `<span class="hs-tick" style="position:absolute;left:${cx(t)}%;transform:translateX(-50%);">+${t}%</span>`).join('')
    + `</div></div>`;

  // ── DRAWDOWN — depth & duration thermometers (green/yellow/red zones) ──
  const ddBar = (d, name) => {
    const c = COL[d.state] || GREEN;
    const tk = d.ticks.map((t, i) => `<span class="hs-tick" style="position:absolute;left:${i / (d.ticks.length - 1) * 100}%;transform:translateX(-50%);">${t}</span>`).join('');
    return `<div class="hs-row"><span class="hs-lab">${name}</span>
      <div style="position:relative;height:42px;">
        <div style="position:absolute;top:21px;left:0;width:${d.green}%;height:8px;border-radius:3px 0 0 3px;background:rgba(74,222,128,0.30);"></div>
        <div style="position:absolute;top:21px;left:${d.green}%;width:${d.yellow - d.green}%;height:8px;background:rgba(251,191,36,0.32);"></div>
        <div style="position:absolute;top:21px;left:${d.yellow}%;right:0;height:8px;border-radius:0 3px 3px 0;background:rgba(248,113,113,0.32);"></div>
        <div style="position:absolute;top:15px;left:${d.pos}%;width:3px;height:20px;background:${c};transform:translateX(-1.5px);border-radius:1px;"></div>
        <div style="position:absolute;top:0;left:${d.pos}%;transform:translateX(-50%);font-size:0.9rem;font-weight:600;color:${c};white-space:nowrap;">${d.label}</div>
        <div style="position:absolute;top:33px;left:0;right:0;height:10px;">${tk}</div>
      </div></div>`;
  };

  // ── RETURN CONFIDENCE — living forward fans (range bars) ──
  const rcRows = h.confidence.rows.map(d => {
    const x = v => clamp(v, d.lo, d.hi);
    const tk = d.ticks.map(t => `<span class="hs-tick" style="position:absolute;left:${x(t)}%;transform:translateX(-50%);">${sgn(t)}%</span>`).join('');
    return `<div class="hs-row"><span class="hs-lab">${d.h}</span>
      <div style="position:relative;height:48px;">
        <div style="position:absolute;top:26px;left:${x(d.p5)}%;width:${x(d.p95) - x(d.p5)}%;height:8px;border-radius:4px;background:rgba(74,222,128,0.15);"></div>
        <div style="position:absolute;top:24px;left:${x(d.p25)}%;width:${x(d.p75) - x(d.p25)}%;height:12px;border-radius:3px;background:rgba(74,222,128,0.45);border:1px solid rgba(74,222,128,0.6);box-sizing:border-box;"></div>
        <div style="position:absolute;top:20px;left:${x(d.med)}%;width:2px;height:20px;background:${WHITE};transform:translateX(-1px);"></div>
        <div style="position:absolute;top:4px;left:${x(d.med)}%;transform:translateX(-50%);font-size:0.95rem;font-weight:600;color:${GREEN};white-space:nowrap;">${sgn(d.med)}%</div>
        <div style="position:absolute;top:24px;left:${x(d.now)}%;width:2px;height:12px;background:${GREY};transform:translateX(-1px);"></div>
        <div style="position:absolute;top:38px;left:${x(d.now)}%;transform:translateX(-50%);font-size:0.66rem;color:${GREY};white-space:nowrap;">now ${sgn(d.now)}%</div>
        <div style="position:absolute;top:40px;left:0;right:0;height:10px;">${tk}</div>
      </div></div>`;
  }).join('');

  // ── MONITORING — two-tail watch, plain language ──
  const mon = [['downside', 'Downside', 'ti-arrow-down-circle'], ['upside', 'Upside', 'ti-arrow-up-circle']]
    .map(([k, cap, ic], i) => {
      const m = h.monitoring[k], c = COL[m.state] || GREEN;
      return `<div style="display:flex;align-items:flex-start;gap:10px;${i === 0 ? 'margin-bottom:11px;' : ''}">
        <i class="ti ${ic}" style="font-size:18px;color:${c};margin-top:1px;" aria-hidden="true"></i>
        <div><span style="font-size:0.95rem;color:${WHITE};">${cap} — ${m.head}</span>
        <div style="font-size:0.82rem;color:${GREY};margin-top:2px;">${m.sub}</div></div></div>`;
    }).join('');

  return `<div class="db-block"><div class="db-eyebrow">Model Health</div>
    <div class="hs-card">
      <div class="hs-h">Return</div>${devRows}${devAxis}
      <div class="hs-h" style="margin-top:20px;">Drawdown</div>${ddBar(h.drawdown.depth, 'Depth')}${ddBar(h.drawdown.duration, 'Duration')}
    </div>
    <div class="hs-card"><div class="hs-h">Return Confidence</div>${rcRows}</div>
    <div class="hs-card"><div class="hs-h">Monitoring</div>${mon}</div>
  </div>`;
}

function replayLine(rep, caption, grey, soft, isMiss) {
  if (!rep || !Object.keys(rep).length) return '';
  const parts = Object.entries(rep).map(([k, v]) =>
    `${k} ${isMiss?'\u2212':''}${Math.abs(v*100).toFixed(0)}${isMiss?'pp':'%'}`).join(' · ');
  return `<div style="margin-top:11px;padding-top:9px;border-top:1px solid #1c1c1c;">
    <div style="font-size:clamp(9px,2.3vw,11px);color:${grey};margin-bottom:3px;">${caption}</div>
    <div style="font-size:clamp(10px,2.6vw,12.5px);color:${soft};">${parts}</div></div>`;
}

function healthBars(perf, serif, green, grey, soft) {
  if (!perf) return '';
  const bar = (cfg) => {
    const pos = v => Math.max(0, Math.min(100, (v - cfg.axisLo) / (cfg.axisHi - cfg.axisLo) * 100));
    const ci = cfg.ci95, lk = cfg.likely;
    const ciL = pos(ci[0]), ciW = pos(ci[1]) - pos(ci[0]);
    const lkL = pos(lk[0]), lkW = pos(lk[1]) - pos(lk[0]);
    const ptP = pos(cfg.value);
    const ticks = [ci[0], lk[0], lk[1], ci[1]];
    const tickEls = ticks.map((t,i) => `<div style="position:absolute;top:18px;left:${pos(t)}%;width:1px;height:20px;background:${i===0||i===3?'rgba(74,222,128,0.55)':green};"></div>
      <div style="position:absolute;top:46px;left:${pos(t)}%;transform:translateX(-50%);font-size:clamp(9px,2.3vw,12px);color:${i===0||i===3?grey:soft};white-space:nowrap;">${cfg.fmt(t)}</div>`).join('');
    const zeroEl = (cfg.axisLo < 0) ? `<div style="position:absolute;top:24px;left:${pos(0)}%;width:1px;height:6px;background:${grey};"></div>
      <div style="position:absolute;top:33px;left:${pos(0)}%;transform:translateX(-50%);font-size:9px;color:${grey};">0</div>` : '';
    return `<div style="position:relative;height:58px;">
      <div style="position:absolute;top:24px;left:0;right:0;height:6px;border-radius:3px;background:rgba(255,255,255,0.07);"></div>
      ${zeroEl}
      <div style="position:absolute;top:22px;left:${ciL}%;width:${ciW}%;height:10px;border-radius:5px;background:rgba(74,222,128,0.15);border:1px solid rgba(74,222,128,0.3);"></div>
      <div style="position:absolute;top:19px;left:${lkL}%;width:${lkW}%;height:16px;border-radius:8px;background:${green};opacity:0.88;"></div>
      <div style="position:absolute;top:10px;left:${ptP}%;width:2px;height:34px;background:#fff;"></div>
      ${tickEls}
      <div style="position:absolute;top:0;left:0;font-size:clamp(9px,2.2vw,11.5px);color:${grey};">${cfg.fmt(cfg.axisLo)}</div>
      <div style="position:absolute;top:0;right:0;font-size:clamp(9px,2.2vw,11.5px);color:${grey};">${cfg.fmt(cfg.axisHi)}</div></div>`;
  };
  const itd = perf.itd, ytd = perf.ytd;
  const pctF = v => (v*100).toFixed(0) + '%';
  const pctS = v => (v>=0?'+':'\u2212') + Math.abs(v*100).toFixed(0) + '%';
  const card = (eyebrow, unit, big, cfg, foot, accent) =>
    `<div style="background:#0D0D0D;border:1px solid ${accent};padding:20px clamp(14px,3.5vw,24px);margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px;">
        <span style="font-size:clamp(9px,2.5vw,11px);font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:${grey};">${eyebrow}</span>
        <span style="font-size:clamp(10px,2.4vw,12px);color:${grey};">${unit}</span></div>
      <div style="display:flex;align-items:baseline;gap:9px;margin-bottom:22px;">
        <span style="font-family:${serif};font-size:clamp(1.3rem,4vw,1.5rem);font-weight:400;color:${green};">${big}</span></div>
      ${bar(cfg)}
      <div style="font-size:clamp(10px,2.4vw,12px);color:${soft};margin-top:6px;">${foot}</div></div>`;
  // YTD caption is dynamic by ELAPSED months of the calendar year (resets every
  // Jan via ytd.months → 0), so it reads correctly in perpetuity — never stale.
  const ym = (ytd.months != null) ? ytd.months : 5;
  const ytdFoot = ym <= 3 ? 'early days — read lightly'
                : ym <= 6 ? 'still early — read directionally'
                : ym <= 9 ? 'most of the year is in'
                :           'year nearly complete';
  return card('Inception–to–date', 'annualized', (itd.value*100).toFixed(2)+'% CAGR',
              { value: itd.value, ci95: itd.ci95, likely: itd.likely, axisLo: 0, axisHi: 0.30, fmt: pctF },
              'solid = likely range · outlined = 95% confidence', 'rgba(204,16,16,0.18)')
       + card('Year–to–date', 'absolute', (ytd.value>=0?'+':'')+(ytd.value*100).toFixed(1)+'% return',
              { value: ytd.value, ci95: ytd.ci95, likely: ytd.likely, axisLo: -0.12, axisHi: 0.18, fmt: pctS },
              ytdFoot, 'rgba(255,255,255,0.08)');
}


// ── CARD (home grid) ──────────────────────────────────────
const cardLabel = l => l === 'Fixed Income' ? 'FI' : l;   // card-only shortening
function renderCard(data) {
  const m = data.model, c = data.card || {};
  const kpis = (c.kpis || []).map(k =>
    `<div class="signal-kpi"><div class="signal-kpi-label">${k.label}</div>
      <div class="signal-kpi-val ${signClass(k.value)}">${fmtKind(k.value, k.kind)}</div></div>`).join('');
  return `<div class="signal-card clickable" onclick="navTo('${m.id}')">
    <div class="signal-card-header">
      <div class="signal-card-name">${m.name}</div>
      <span class="signal-badge ${stateClass(m.state)}">${stateLabel(m.state)}</span>
    </div>
    <div class="signal-kpis">${kpis}</div>
    <div class="signal-alloc-label">Allocation</div>
    <div class="signal-alloc-row">${renderWeights(c.weights, cardLabel)}</div>
  </div>`;
}

// ── MODEL PAGE (compose visible blocks generically) ───────
function renderModelPage(data) {
  const m = data.model;
  const asOf = m.as_of ? `Updated as at market close · ${fmtDate(m.as_of)}` : 'Awaiting first published signal';
  // Change lines (REGIME / ASSET VAMS) ride in the header block, between the
  // badge and the date. Sourced from the `changes` block; Hedra's is
  // visible:false so changeLinesFor() returns '' and nothing shows.
  const changeLines = changeLinesFor(data);
  let html = `<div class="db-eyebrow">Today's Signal</div>
    <h1 class="db-title">${m.name}<span class="signal-badge ${stateClass(m.state)}">${stateLabel(m.state)}</span></h1>
    ${changeLines}
    <div class="signal-date">${asOf}</div>`;
  (data.blocks || []).forEach(b => {
    if (!b.visible) return;
    const r = BLOCK_RENDERERS[b.type];
    if (r) { try { html += r(b, data); } catch(e) { console.error('block', b.type, e); } }
  });
  document.getElementById('page-' + m.id + '-body').innerHTML = html;
}

// ── DATA LOADING ──────────────────────────────────────────
const ORDER = ['hedra','aegis','eidos'];
async function loadData() {
  try {
    const [hedra, aegis, eidos] = await Promise.all([
      fetch('hedra.json?v=' + Date.now()).then(r => r.json()),
      fetch('aegis.json?v=' + Date.now()).then(r => r.json()),
      fetch('eidos.json?v=' + Date.now()).then(r => r.json()),
    ]);
    const byId = { hedra, aegis, eidos };
    const asOf = (hedra.model && hedra.model.as_of) || null;
    document.getElementById('todayDate').textContent = 'Updated as at market close · ' + fmtDate(asOf);
    document.getElementById('cardGrid').innerHTML = ORDER.map(id => renderCard(byId[id])).join('');
    ORDER.forEach(id => { try { renderModelPage(byId[id]); } catch(e) { console.error('page', id, e); } });
  } catch (err) {
    console.error('Data load error:', err);
    const banner = document.getElementById('dataErrorBanner');
    if (banner) {
      banner.textContent = 'Unable to load model data. Please try refreshing. If the problem persists, data may not yet be published for today.';
      banner.classList.add('visible');
    }
  }
}
loadData();
</script>
