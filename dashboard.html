<!DOCTYPE html>
<!-- BLACK KNOT ANALYTICS — Dashboard | dashboard.html | v4.1 (block-driven, bk.css-native) -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="theme-color" content="#000000">
<title>BLACK KNOT ANALYTICS — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="bk.css">
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.0"></script>
<script>
  const SUPABASE_URL = 'https://lteeroxgbxbgvfqntfoo.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_J2Ik8meti23EXo_sNEX7bQ_dpYmZDgz';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { persistSession:true, autoRefreshToken:true, detectSessionInUrl:true }
  });
  // ── AUTH GUARD (preserved exactly) ────────────────────────
  document.documentElement.style.visibility = 'hidden';
  (async () => {
    const { data:{ session } } = await sb.auth.getSession();
    if (!session) { window.location.replace('index.html'); return; }
    document.documentElement.style.visibility = 'visible';
  })();
</script>

<div class="db-wrap">

<!-- ─── NAV (bk.css .db-nav) ─────────────────────────────── -->
<nav class="db-nav" id="dbNav">
  <a href="index.html" class="db-nav-logo"><img src="logo.png" alt="BLACK KNOT ANALYTICS"></a>
  <div class="db-nav-right">
    <a href="index.html" class="db-nav-link">Home</a>
    <button class="db-nav-link active" data-page="today" onclick="navTo('today')">Today's Signal</button>
    <button class="db-nav-link"        data-page="aegis" onclick="navTo('aegis')">AEGIS</button>
    <button class="db-nav-link"        data-page="eidos" onclick="navTo('eidos')">EIDOS</button>
    <button class="db-nav-link"        data-page="hedra" onclick="navTo('hedra')">HEDRA</button>
    <button class="db-nav-signout" onclick="signOut()">Sign Out</button>
    <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- ─── MENU OVERLAY (bk.css .menu-overlay dropdown) ──────── -->
<div class="menu-overlay" id="menuOverlay">
  <button onclick="navTo('today');toggleMenu();" class="active" id="menuToday">Today's Signal</button>
  <button onclick="navTo('aegis');toggleMenu();" id="menuAegis">AEGIS</button>
  <button onclick="navTo('eidos');toggleMenu();" id="menuEidos">EIDOS</button>
  <button onclick="navTo('hedra');toggleMenu();" id="menuHedra">HEDRA</button>
  <div class="menu-divider"></div>
  <button class="menu-accent" onclick="signOut()">Sign Out</button>
</div>

<main class="db-page">
  <section id="page-today" class="db-page-section active">
    <div class="db-inner">
      <div class="db-eyebrow">Dashboard</div>
      <h1 class="db-title">Today's Signal</h1>
      <div class="signal-date" id="todayDate">—</div>
      <div class="data-error-banner" id="dataErrorBanner"></div>
      <div class="signal-cards" id="cardGrid"></div>
    </div>
  </section>
  <section id="page-aegis" class="db-page-section"><div class="db-inner" id="page-aegis-body"></div></section>
  <section id="page-eidos" class="db-page-section"><div class="db-inner" id="page-eidos-body"></div></section>
  <section id="page-hedra" class="db-page-section"><div class="db-inner" id="page-hedra-body"></div></section>
</main>
</div>

<script>
// ── NAV ───────────────────────────────────────────────────
function navTo(page) {
  document.querySelectorAll('.db-page-section').forEach(s => s.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.db-nav-link').forEach(l => l.classList.remove('active'));
  const btn = document.querySelector(`.db-nav-link[data-page="${page}"]`);
  if (btn) btn.classList.add('active');
  ['menuToday','menuAegis','menuEidos','menuHedra'].forEach(id => document.getElementById(id).classList.remove('active'));
  const menuMap = { today:'menuToday', aegis:'menuAegis', eidos:'menuEidos', hedra:'menuHedra' };
  if (menuMap[page]) document.getElementById(menuMap[page]).classList.add('active');
  window.scrollTo(0,0);
}
function toggleMenu() {
  document.getElementById('hamburger').classList.toggle('open');
  document.getElementById('menuOverlay').classList.toggle('open');
}
document.addEventListener('click', e => {
  const menu = document.getElementById('menuOverlay'), burger = document.getElementById('hamburger');
  if (menu.classList.contains('open') && !menu.contains(e.target) && !burger.contains(e.target)) {
    menu.classList.remove('open'); burger.classList.remove('open');
  }
});
window.addEventListener('scroll', () => {
  document.getElementById('dbNav').classList.toggle('scrolled', window.scrollY > 40);
});
async function signOut() {
  try { await sb.auth.signOut(); } catch(e) {}
  window.location.replace('index.html');
}

// ── FORMAT HELPERS ────────────────────────────────────────
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(d) { if (!d) return '—'; const p = d.split('-'); return `${parseInt(p[2])} ${MONTHS[parseInt(p[1])-1]} ${p[0]}`; }
function fmtPct(v, signed) { if (v == null) return '—'; const s = signed && v >= 0 ? '+' : ''; return s + Number(v).toFixed(2) + '%'; }
function fmtNum(v, dp) { if (v == null) return '—'; return Number(v).toFixed(dp == null ? 2 : dp); }
function badgeClass(b) { b = (b || '').toLowerCase(); return /action/.test(b) ? 'action' : /pending/.test(b) ? 'pending' : 'hold'; }
function valCls(v) { return v == null ? 'neu' : (v >= 0 ? 'pos' : 'neg'); }
function tdRet(v) { return v == null ? 'td-bench' : (v >= 0 ? 'td-pos' : 'td-neg'); }

// ── CARD (home grid) — bk.css .signal-card ────────────────
function renderCard(data) {
  const m = data.model, c = data.card || {};
  const badge = c.badge || '—';
  const kpis = (c.kpis || []).map(k =>
    `<div class="signal-kpi"><div class="signal-kpi-label">${k.label}</div>
      <div class="signal-kpi-val ${valCls(k.value)}">${fmtPct(k.value)}</div></div>`).join('');
  const alloc = (c.weights || []).map(w =>
    `<div class="signal-alloc-block"><div class="signal-alloc-ticker">${w.label === 'Fixed Income' ? 'FI' : w.label}</div>
      <div class="signal-alloc-pct ${w.pct === 0 ? 'zero' : ''}">${w.pct == null ? '—' : Math.round(w.pct) + '%'}</div></div>`).join('');
  return `<div class="signal-card clickable" onclick="navTo('${m.id}')">
    <div class="signal-card-header">
      <div class="signal-card-name">${m.name}</div>
      <span class="signal-badge ${badgeClass(badge)}">${badge}</span>
    </div>
    <div class="signal-kpis">${kpis}</div>
    <div class="signal-alloc-label">Allocation</div>
    <div class="signal-alloc-row">${alloc}</div>
  </div>`;
}

// ── BLOCK RENDERERS (generic, dispatched by block.type) ───
function blkSignal(b, data) {
  let inner;
  if (b.status === 'pending') {
    inner = `<div class="signal-pending">${b.note || 'Signal not yet published.'}</div>`;
  } else {
    const w = b.weights || {};
    const strip = Object.keys(w).map(k => {
      const pct = (w[k] || {}).target_weight;
      return `<div class="signal-alloc-block"><div class="signal-alloc-ticker">${k}</div>
        <div class="signal-alloc-pct ${pct === 0 ? 'zero' : ''}">${pct == null ? '—' : Math.round(pct) + '%'}</div></div>`;
    }).join('');
    const act = (b.action || {}).rebalance_required;
    const statusLine = act ? `<div class="signal-status action">Action Required</div>` : '';
    inner = `${statusLine}<div class="signal-alloc-row">${strip}</div>`;
  }
  return `<div class="db-block"><div class="db-eyebrow">Signal</div>
    <div class="signal-panel">${inner}</div></div>`;
}

function perfBlock(heading, headLabel, modelId, mObj, sObj, rows, ratioKeys) {
  const head = `<tr><th>${headLabel}</th><th class="col-model">${modelId.toUpperCase()}</th><th>SPY</th></tr>`;
  const body = rows.map(([label, key]) => {
    const isRatio = ratioKeys && ratioKeys.indexOf(key) !== -1;
    const mv = mObj ? mObj[key] : null, sv = sObj ? sObj[key] : null;
    const fmt = isRatio ? (v => fmtNum(v)) : (v => fmtPct(v, true));
    const mc = isRatio ? 'td-model' : tdRet(mv);
    return `<tr><td>${label}</td><td class="${mc}">${fmt(mv)}</td><td class="td-bench">${fmt(sv)}</td></tr>`;
  }).join('');
  return `<div class="perf-table-block">
    <div class="perf-table-heading">${heading}</div>
    <div class="perf-table-wrap"><table class="perf-table">
      <thead>${head}</thead><tbody>${body}</tbody></table></div></div>`;
}

function blkPerformance(b, data) {
  const id = data.model.id;
  const cm = (b.cum_returns || {})[id], cs = (b.cum_returns || {}).spy_bh;
  const rm = (b.risk || {})[id],        rs = (b.risk || {}).spy_bh;
  const am = (b.returns || {})[id],     asb = (b.returns || {}).spy_bh;

  let inner = '';
  if (cm || rm || am) {
    if (cm) inner += perfBlock('Cumulative Return', 'Period', id, cm, cs, [
      ['YTD','ytd'], ['1 Year','1yr'], ['3 Year','3yr'], ['5 Year','5yr'],
      ['Inception','itd'], ['CAGR (ITD)','cagr_itd'],
    ]);
    if (am) {
      const years = Object.keys(am).filter(k => /^\d{4}$/.test(k)).sort();
      const head = `<tr><th>Year</th><th class="col-model">${id.toUpperCase()}</th><th>SPY</th></tr>`;
      const rowsArr = years.concat(am.ytd !== undefined ? ['ytd'] : []);
      const body = rowsArr.map(y => {
        const label = y === 'ytd' ? 'YTD' : y;
        const mv = am[y], sv = asb ? asb[y] : null;
        const rc = y === 'ytd' ? 'row-ytd' : '';
        return `<tr class="${rc}"><td>${label}</td><td class="${tdRet(mv)}">${fmtPct(mv,true)}</td>
          <td class="td-bench">${fmtPct(sv,true)}</td></tr>`;
      }).join('');
      inner += `<div class="perf-table-block"><div class="perf-table-heading">Annual Return</div>
        <div class="perf-table-wrap"><table class="perf-table"><thead>${head}</thead><tbody>${body}</tbody></table></div></div>`;
    }
    if (rm) inner += perfBlock('Risk &amp; Ratios', 'Metric', id, rm, rs, [
      ['CAGR','cagr'], ['Volatility','volatility'], ['Sharpe','sharpe'], ['Sortino','sortino'],
      ['Calmar','calmar'], ['MAR','mar'], ['Max Drawdown','maxdd'], ['Avg Drawdown','avg_drawdown'],
      ['Beta','beta'], ['Omega','omega'], ['Upside Capture','upside_capture'], ['Downside Capture','downside_capture'],
    ], ['sharpe','sortino','calmar','mar','beta','omega']);
  } else {
    inner = `<div class="signal-panel"><div class="signal-pending">Performance is published once the signal is live.</div></div>`;
  }
  return `<div class="db-block"><div class="db-eyebrow">Performance</div>${inner}</div>`;
}

function blkAllocation(b, data) {
  const rows = b.rows || [];
  let inner;
  if (!rows.length) {
    inner = `<div class="signal-panel"><div class="signal-pending">Allocation detail is published once the signal is live.</div></div>`;
  } else {
    const cols = b.columns || [];
    const head = '<tr>' + cols.map(c => `<th>${c}</th>`).join('') + '</tr>';
    const body = rows.map(r => '<tr>' + r.map(cell => `<td>${cell == null ? '—' : cell}</td>`).join('') + '</tr>').join('');
    inner = `<div class="perf-table-wrap"><table class="perf-table"><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
  }
  return `<div class="db-block"><div class="db-eyebrow">Allocation</div>${inner}</div>`;
}

function blkRebalancing(b, data) {
  const avg = (b.averages || {}).total, ytd = ((b.annual || {}).ytd || {}).total, cum = (b.cumulative || {}).total;
  return `<div class="db-block"><div class="db-eyebrow">Rebalancing</div>
    <div class="perf-table-wrap"><table class="perf-table"><tbody>
      <tr><td>Average / year</td><td class="td-model">${avg == null ? '—' : fmtNum(avg,1)}</td></tr>
      <tr><td>Year to date</td><td class="td-model">${ytd == null ? '—' : ytd}</td></tr>
      <tr><td>Cumulative (ITD)</td><td class="td-model">${cum == null ? '—' : cum}</td></tr>
    </tbody></table></div></div>`;
}

const BLOCK_RENDERERS = {
  signal: blkSignal, performance: blkPerformance, allocation: blkAllocation, rebalancing: blkRebalancing,
};

// ── MODEL PAGE (compose visible blocks generically) ───────
function renderModelPage(data) {
  const m = data.model;
  const asOf = m.as_of ? `Updated as at market close · ${fmtDate(m.as_of)}` : 'Awaiting first published signal';
  let html = `<div class="db-eyebrow">Model</div>
    <h1 class="db-title">${m.name}<span class="signal-badge ${badgeClass(m.badge)}">${m.badge || '—'}</span></h1>
    <div class="signal-date">${asOf}</div>`;
  (data.blocks || []).forEach(b => {
    if (!b.visible) return;
    const r = BLOCK_RENDERERS[b.type];
    if (r) { try { html += r(b, data); } catch(e) { console.error('block', b.type, e); } }
  });
  document.getElementById('page-' + m.id + '-body').innerHTML = html;
}

// ── DATA LOADING ──────────────────────────────────────────
const ORDER = ['hedra','aegis','eidos'];
async function loadData() {
  try {
    const [hedra, aegis, eidos] = await Promise.all([
      fetch('hedra.json?v=' + Date.now()).then(r => r.json()),
      fetch('aegis.json?v=' + Date.now()).then(r => r.json()),
      fetch('eidos.json?v=' + Date.now()).then(r => r.json()),
    ]);
    const byId = { hedra, aegis, eidos };
    const asOf = (hedra.model && hedra.model.as_of) || null;
    document.getElementById('todayDate').textContent = 'Updated as at market close · ' + fmtDate(asOf);
    document.getElementById('cardGrid').innerHTML = ORDER.map(id => renderCard(byId[id])).join('');
    ORDER.forEach(id => { try { renderModelPage(byId[id]); } catch(e) { console.error('page', id, e); } });
  } catch (err) {
    console.error('Data load error:', err);
    const banner = document.getElementById('dataErrorBanner');
    if (banner) {
      banner.textContent = 'Unable to load model data. Please try refreshing. If the problem persists, data may not yet be published for today.';
      banner.classList.add('visible');
    }
  }
}
loadData();
</script>
</body>
</html>
